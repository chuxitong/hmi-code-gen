  <text x="50.0" y="170" text-anchor="middle" class="meta-text">state = normal</text>
</g>
    </g>
    <g id="state=warning" transform="translate(156 12)">
      <g id="body">
        <rect x="6" y="20" width="80" height="56" rx="6" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <rect x="10" y="24" width="72" height="10" fill="#ef6c00"/>
      </g>
      <g id="indicator">
        <line x1="20" y1="60" x2="74" y2="42"
