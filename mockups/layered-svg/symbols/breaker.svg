<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="540" height="174"
     viewBox="0 0 540 174" data-symbol="breaker"
     font-family="Inter, system-ui, sans-serif" font-size="11">
  <title>breaker</title>
  <defs>
    <style>
      .badge-text { font-size: 9px; font-weight: 700; fill: white; }
      .label-text { font-size: 10px; font-weight: 600; fill: #1b2630; }
      .meta-text  { font-size: 9px; fill: #5a6675; }
    </style>
  </defs>
  <rect x="0" y="0" width="540" height="174" fill="#ffffff"/>
  <g id="component-set" data-component="breaker">
    <g id="state=normal" transform="translate(28 12)">
<g id="body">
  <rect x="6" y="20" width="80" height="56" rx="6" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
</g>
<g id="state-fill">
  <rect x="10" y="24" width="72" height="10" fill="#2e7d32"/>
</g>
<g id="indicator">
