<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="460" height="180"
     viewBox="0 0 460 180" data-symbol="sensor"
     font-family="Inter, system-ui, sans-serif" font-size="11">
  <title>sensor</title>
  <defs>
    <style>
      .badge-text { font-size: 9px; font-weight: 700; fill: white; }
      .label-text { font-size: 10px; font-weight: 600; fill: #1b2630; }
      .meta-text  { font-size: 9px; fill: #5a6675; }
    </style>
  </defs>
  <rect x="0" y="0" width="460" height="180" fill="#ffffff"/>
  <g id="component-set" data-component="sensor">
    <g id="state=normal" transform="translate(28 12)">
<g id="body">
  <circle cx="40" cy="40" r="26" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
</g>
<g id="state-fill">
  <circle cx="40" cy="40" r="14" fill="#2e7d32"/>
</g>
<g id="indicator">
  <text x="40" y="44" text-anchor="middle" fill="white" font-weight="700">T</text>
</g>
<g id="connector-bottom">
  <line x1="40" y1="66" x2="40" y2="86" stroke="#3a4756" stroke-width="3"/>
</g>
<g id="state-badge" data-state="normal">
  <rect x="0" y="134" width="28" height="14" rx="3" fill="#2e7d32"/>
  <text x="14.0" y="144.5" text-anchor="middle" class="badge-text">OK</text>
</g>
<g id="label">
  <text x="40.0" y="164" text-anchor="middle" class="label-text">SENSOR</text>
  <text x="40.0" y="176" text-anchor="middle" class="meta-text">state = normal</text>
</g>
    </g>
    <g id="state=warning" transform="translate(136 12)">
      <g id="body">
        <circle cx="40" cy="40" r="26" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <circle cx="40" cy="40" r="14" fill="#ef6c00"/>
      </g>
      <g id="indicator">
        <text x="40" y="44" text-anchor="middle" fill="white" font-weight="700">T</text>
      </g>
      <g id="connector-bottom">
        <line x1="40" y1="66" x2="40" y2="86" stroke="#3a4756" stroke-width="3"/>
      </g>
<g id="state-shape" data-state="warning">
  <polyline points="10,102 32.0,102 40.0,94 48.0,102 70,102"
           fill="none" stroke="#ef6c00" stroke-width="1.4"/>
</g>
<g id="state-badge" data-state="warning">
  <rect x="0" y="134" width="44" height="14" rx="3" fill="#ef6c00"/>
  <text x="22.0" y="144.5" text-anchor="middle" class="badge-text">WARN</text>
</g>
<g id="label">
  <text x="40.0" y="164" text-anchor="middle" class="label-text">SENSOR</text>
  <text x="40.0" y="176" text-anchor="middle" class="meta-text">state = warning</text>
</g>
    </g>
    <g id="state=alarm" transform="translate(244 12)">
      <g id="body">
        <circle cx="40" cy="40" r="26" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <circle cx="40" cy="40" r="14" fill="#c62828"/>
      </g>
      <g id="indicator">
        <text x="40" y="44" text-anchor="middle" fill="white" font-weight="700">T</text>
      </g>
      <g id="connector-bottom">
        <line x1="40" y1="66" x2="40" y2="86" stroke="#3a4756" stroke-width="3"/>
      </g>
<g id="state-shape" data-state="alarm">
  <rect x="6" y="2" width="68" height="96" rx="4"
        fill="none" stroke="#c62828" stroke-width="2.4"/>
  <polygon points="58,6 70,6 70,18"
           fill="#c62828"/>
  <text x="64" y="15" text-anchor="middle"
        fill="white" font-size="9" font-weight="700">!</text>
</g>
<g id="state-badge" data-state="alarm">
  <rect x="0" y="134" width="52" height="14" rx="3" fill="#c62828"/>
  <text x="26.0" y="144.5" text-anchor="middle" class="badge-text">ALARM</text>
</g>
<g id="label">
  <text x="40.0" y="164" text-anchor="middle" class="label-text">SENSOR</text>
  <text x="40.0" y="176" text-anchor="middle" class="meta-text">state = alarm</text>
</g>
    </g>
    <g id="state=closed" transform="translate(352 12)">
      <g id="body">
        <circle cx="40" cy="40" r="26" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <circle cx="40" cy="40" r="14" fill="#90a4ae"/>
      </g>
      <g id="indicator">
        <text x="40" y="44" text-anchor="middle" fill="white" font-weight="700">T</text>
      </g>
      <g id="connector-bottom">
        <line x1="40" y1="66" x2="40" y2="86" stroke="#3a4756" stroke-width="3"/>
      </g>
<g id="state-shape" data-state="closed">
  <line x1="8" y1="4" x2="72" y2="96"
        stroke="#90a4ae" stroke-width="2"/>
  <line x1="72" y1="4" x2="8" y2="96"
        stroke="#90a4ae" stroke-width="2"/>
</g>
<g id="state-badge" data-state="closed">
  <rect x="0" y="134" width="60" height="14" rx="3" fill="#90a4ae"/>
  <text x="30.0" y="144.5" text-anchor="middle" class="badge-text">CLOSED</text>
</g>
<g id="label">
  <text x="40.0" y="164" text-anchor="middle" class="label-text">SENSOR</text>
  <text x="40.0" y="176" text-anchor="middle" class="meta-text">state = closed</text>
</g>
    </g>
  </g>
</svg>
