        <ellipse cx="80" cy="50" rx="70" ry="34" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <path d="M14,52 q70,-30 132,0 v30 q-70,20 -132,0 z" fill="#90a4ae" opacity="0.55"/>
      </g>
      <g id="connector-left">
        <rect x="0" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
      <g id="connector-right">
        <rect x="146" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
<g id="state-shape" data-state="closed">
  <line x1="8" y1="8" x2="152" y2="88"
        stroke="#90a4ae" stroke-width="2"/>
  <line x1="152" y1="8" x2="8" y2="88"
        stroke="#90a4ae" stroke-width="2"/>
</g>
<g id="state-badge" data-state="closed">
  <rect x="0" y="134" width="60" height="14" rx="3" fill="#90a4ae"/>
  <text x="30.0" y="144.5" text-anchor="middle" class="badge-text">CLOSED</text>
</g>
<g id="label">
  <text x="80.0" y="164" text-anchor="middle" class="label-text">SEPARATOR</text>
  <text x="80.0" y="176" text-anchor="middle" class="meta-text">state = closed</text>
</g>
    </g>
  </g>
