<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="180"
     viewBox="0 0 780 180" data-symbol="separator"
     font-family="Inter, system-ui, sans-serif" font-size="11">
  <title>separator</title>
  <defs>
    <style>
      .badge-text { font-size: 9px; font-weight: 700; fill: white; }
      .label-text { font-size: 10px; font-weight: 600; fill: #1b2630; }
      .meta-text  { font-size: 9px; fill: #5a6675; }
    </style>
  </defs>
  <rect x="0" y="0" width="780" height="180" fill="#ffffff"/>
  <g id="component-set" data-component="separator">
    <g id="state=normal" transform="translate(28 12)">
<g id="body">
  <ellipse cx="80" cy="50" rx="70" ry="34" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
</g>
<g id="state-fill">
  <path d="M14,52 q70,-30 132,0 v30 q-70,20 -132,0 z" fill="#2e7d32" opacity="0.55"/>
</g>
<g id="connector-left">
  <rect x="0" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
</g>
<g id="connector-right">
  <rect x="146" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
</g>
<g id="state-badge" data-state="normal">
  <rect x="0" y="134" width="28" height="14" rx="3" fill="#2e7d32"/>
  <text x="14.0" y="144.5" text-anchor="middle" class="badge-text">OK</text>
</g>
<g id="label">
  <text x="80.0" y="164" text-anchor="middle" class="label-text">SEPARATOR</text>
  <text x="80.0" y="176" text-anchor="middle" class="meta-text">state = normal</text>
</g>
    </g>
    <g id="state=warning" transform="translate(216 12)">
      <g id="body">
        <ellipse cx="80" cy="50" rx="70" ry="34" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <path d="M14,52 q70,-30 132,0 v30 q-70,20 -132,0 z" fill="#ef6c00" opacity="0.55"/>
      </g>
      <g id="connector-left">
        <rect x="0" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
      <g id="connector-right">
        <rect x="146" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
<g id="state-shape" data-state="warning">
  <polyline points="10,94 72.0,94 80.0,86 88.0,94 150,94"
           fill="none" stroke="#ef6c00" stroke-width="1.4"/>
</g>
<g id="state-badge" data-state="warning">
  <rect x="0" y="134" width="44" height="14" rx="3" fill="#ef6c00"/>
  <text x="22.0" y="144.5" text-anchor="middle" class="badge-text">WARN</text>
</g>
<g id="label">
  <text x="80.0" y="164" text-anchor="middle" class="label-text">SEPARATOR</text>
  <text x="80.0" y="176" text-anchor="middle" class="meta-text">state = warning</text>
</g>
    </g>
    <g id="state=alarm" transform="translate(404 12)">
      <g id="body">
        <ellipse cx="80" cy="50" rx="70" ry="34" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <path d="M14,52 q70,-30 132,0 v30 q-70,20 -132,0 z" fill="#c62828" opacity="0.55"/>
      </g>
      <g id="connector-left">
        <rect x="0" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
      <g id="connector-right">
        <rect x="146" y="44" width="14" height="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
<g id="state-shape" data-state="alarm">
  <rect x="6" y="6" width="148" height="84" rx="4"
        fill="none" stroke="#c62828" stroke-width="2.4"/>
  <polygon points="138,10 150,10 150,22"
           fill="#c62828"/>
  <text x="144" y="19" text-anchor="middle"
        fill="white" font-size="9" font-weight="700">!</text>
</g>
<g id="state-badge" data-state="alarm">
  <rect x="0" y="134" width="52" height="14" rx="3" fill="#c62828"/>
  <text x="26.0" y="144.5" text-anchor="middle" class="badge-text">ALARM</text>
</g>
<g id="label">
  <text x="80.0" y="164" text-anchor="middle" class="label-text">SEPARATOR</text>
  <text x="80.0" y="176" text-anchor="middle" class="meta-text">state = alarm</text>
</g>
    </g>
    <g id="state=closed" transform="translate(592 12)">
