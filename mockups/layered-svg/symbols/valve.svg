<g id="connector-left">
  <rect x="0" y="38" width="20" height="14" fill="#cdd5df" stroke="#3a4756"/>
</g>
<g id="connector-right">
  <rect x="80" y="38" width="20" height="14" fill="#cdd5df" stroke="#3a4756"/>
</g>
<g id="body">
