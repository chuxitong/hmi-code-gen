<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="540" height="194"
     viewBox="0 0 540 194" data-symbol="mixer"
     font-family="Inter, system-ui, sans-serif" font-size="11">
  <title>mixer</title>
  <defs>
    <style>
      .badge-text { font-size: 9px; font-weight: 700; fill: white; }
      .label-text { font-size: 10px; font-weight: 600; fill: #1b2630; }
      .meta-text  { font-size: 9px; fill: #5a6675; }
    </style>
  </defs>
  <rect x="0" y="0" width="540" height="194" fill="#ffffff"/>
  <g id="component-set" data-component="mixer">
    <g id="state=normal" transform="translate(28 12)">
<g id="body">
  <rect x="20" y="20" width="60" height="80" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
</g>
<g id="state-fill">
  <rect x="22" y="60" width="56" height="38" fill="#2e7d32" opacity="0.55"/>
</g>
<g id="indicator">
  <line x1="50" y1="36" x2="50" y2="86" stroke="#3a4756" stroke-width="3"/>
  <line x1="36" y1="80" x2="64" y2="80" stroke="#3a4756" stroke-width="3"/>
</g>
<g id="state-badge" data-state="normal">
  <rect x="0" y="148" width="28" height="14" rx="3" fill="#2e7d32"/>
  <text x="14.0" y="158.5" text-anchor="middle" class="badge-text">OK</text>
</g>
<g id="label">
  <text x="50.0" y="178" text-anchor="middle" class="label-text">MIXER</text>
  <text x="50.0" y="190" text-anchor="middle" class="meta-text">state = normal</text>
</g>
    </g>
    <g id="state=warning" transform="translate(156 12)">
      <g id="body">
        <rect x="20" y="20" width="60" height="80" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <rect x="22" y="60" width="56" height="38" fill="#ef6c00" opacity="0.55"/>
      </g>
      <g id="indicator">
        <line x1="50" y1="36" x2="50" y2="86" stroke="#3a4756" stroke-width="3"/>
        <line x1="36" y1="80" x2="64" y2="80" stroke="#3a4756" stroke-width="3"/>
      </g>
<g id="state-shape" data-state="warning">
  <polyline points="16,114 42.0,114 50.0,106 58.0,114 84,114"
           fill="none" stroke="#ef6c00" stroke-width="1.4"/>
</g>
<g id="state-badge" data-state="warning">
  <rect x="0" y="148" width="44" height="14" rx="3" fill="#ef6c00"/>
  <text x="22.0" y="158.5" text-anchor="middle" class="badge-text">WARN</text>
</g>
<g id="label">
  <text x="50.0" y="178" text-anchor="middle" class="label-text">MIXER</text>
  <text x="50.0" y="190" text-anchor="middle" class="meta-text">state = warning</text>
</g>
    </g>
    <g id="state=alarm" transform="translate(284 12)">
      <g id="body">
        <rect x="20" y="20" width="60" height="80" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <rect x="22" y="60" width="56" height="38" fill="#c62828" opacity="0.55"/>
      </g>
      <g id="indicator">
        <line x1="50" y1="36" x2="50" y2="86" stroke="#3a4756" stroke-width="3"/>
        <line x1="36" y1="80" x2="64" y2="80" stroke="#3a4756" stroke-width="3"/>
      </g>
<g id="state-shape" data-state="alarm">
  <rect x="12" y="2" width="76" height="108" rx="4"
        fill="none" stroke="#c62828" stroke-width="2.4"/>
  <polygon points="72,6 84,6 84,18"
           fill="#c62828"/>
  <text x="78" y="15" text-anchor="middle"
        fill="white" font-size="9" font-weight="700">!</text>
</g>
<g id="state-badge" data-state="alarm">
  <rect x="0" y="148" width="52" height="14" rx="3" fill="#c62828"/>
  <text x="26.0" y="158.5" text-anchor="middle" class="badge-text">ALARM</text>
</g>
<g id="label">
  <text x="50.0" y="178" text-anchor="middle" class="label-text">MIXER</text>
  <text x="50.0" y="190" text-anchor="middle" class="meta-text">state = alarm</text>
</g>
    </g>
    <g id="state=closed" transform="translate(412 12)">
      <g id="body">
        <rect x="20" y="20" width="60" height="80" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
      </g>
      <g id="state-fill">
        <rect x="22" y="60" width="56" height="38" fill="#90a4ae" opacity="0.55"/>
      </g>
      <g id="indicator">
        <line x1="50" y1="36" x2="50" y2="86" stroke="#3a4756" stroke-width="3"/>
        <line x1="36" y1="80" x2="64" y2="80" stroke="#3a4756" stroke-width="3"/>
      </g>
<g id="state-shape" data-state="closed">
  <line x1="14" y1="4" x2="86" y2="108"
        stroke="#90a4ae" stroke-width="2"/>
  <line x1="86" y1="4" x2="14" y2="108"
        stroke="#90a4ae" stroke-width="2"/>
</g>
<g id="state-badge" data-state="closed">
  <rect x="0" y="148" width="60" height="14" rx="3" fill="#90a4ae"/>
  <text x="30.0" y="158.5" text-anchor="middle" class="badge-text">CLOSED</text>
</g>
<g id="label">
  <text x="50.0" y="178" text-anchor="middle" class="label-text">MIXER</text>
  <text x="50.0" y="190" text-anchor="middle" class="meta-text">state = closed</text>
</g>
    </g>
  </g>
</svg>
