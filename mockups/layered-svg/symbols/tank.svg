    <g id="state=normal" transform="translate(28 12)">
<g id="outline">
  <rect x="14" y="10" width="60" height="100" rx="4" fill="none" stroke="#3a4756" stroke-width="2"/>
</g>
<g id="body">
  <rect x="16" y="12" width="56" height="96" rx="4" fill="#cdd5df"/>
</g>
