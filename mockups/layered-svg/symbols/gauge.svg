<g id="body">
  <circle cx="60" cy="60" r="48" fill="#cdd5df" stroke="#3a4756" stroke-width="2"/>
</g>
<g id="scale">
  <path d="M20,72 A48,48 0 0 1 100,72" fill="none" stroke="#3a4756" stroke-width="2"/>
