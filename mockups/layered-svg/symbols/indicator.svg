<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="130"
     viewBox="0 0 300 130" data-symbol="indicator"
     font-family="Inter, system-ui, sans-serif" font-size="11">
  <title>indicator</title>
  <defs>
    <style>
      .badge-text { font-size: 9px; font-weight: 700; fill: white; }
      .label-text { font-size: 10px; font-weight: 600; fill: #1b2630; }
      .meta-text  { font-size: 9px; fill: #5a6675; }
    </style>
  </defs>
  <rect x="0" y="0" width="300" height="130" fill="#ffffff"/>
  <g id="component-set" data-component="indicator">
    <g id="state=normal" transform="translate(28 12)">
<g id="body">
  <circle cx="20" cy="20" r="14" fill="#cdd5df" stroke="#3a4756"/>
</g>
<g id="state-fill">
  <circle cx="20" cy="20" r="8" fill="#2e7d32"/>
</g>
<g id="state-badge" data-state="normal">
  <rect x="0" y="84" width="28" height="14" rx="3" fill="#2e7d32"/>
  <text x="14.0" y="94.5" text-anchor="middle" class="badge-text">OK</text>
</g>
<g id="label">
  <text x="20.0" y="114" text-anchor="middle" class="label-text">INDICATOR</text>
  <text x="20.0" y="126" text-anchor="middle" class="meta-text">state = normal</text>
</g>
    </g>
    <g id="state=warning" transform="translate(96 12)">
      <g id="body">
        <circle cx="20" cy="20" r="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
      <g id="state-fill">
        <circle cx="20" cy="20" r="8" fill="#ef6c00"/>
      </g>
<g id="state-shape" data-state="warning">
  <polyline points="4,44 12.0,44 20.0,36 28.0,44 36,44"
           fill="none" stroke="#ef6c00" stroke-width="1.4"/>
</g>
<g id="state-badge" data-state="warning">
  <rect x="0" y="84" width="44" height="14" rx="3" fill="#ef6c00"/>
  <text x="22.0" y="94.5" text-anchor="middle" class="badge-text">WARN</text>
</g>
<g id="label">
  <text x="20.0" y="114" text-anchor="middle" class="label-text">INDICATOR</text>
  <text x="20.0" y="126" text-anchor="middle" class="meta-text">state = warning</text>
</g>
    </g>
    <g id="state=alarm" transform="translate(164 12)">
      <g id="body">
        <circle cx="20" cy="20" r="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
      <g id="state-fill">
        <circle cx="20" cy="20" r="8" fill="#c62828"/>
      </g>
<g id="state-shape" data-state="alarm">
  <rect x="0" y="0" width="40" height="40" rx="4"
        fill="none" stroke="#c62828" stroke-width="2.4"/>
  <polygon points="24,4 36,4 36,16"
           fill="#c62828"/>
  <text x="30" y="13" text-anchor="middle"
        fill="white" font-size="9" font-weight="700">!</text>
</g>
<g id="state-badge" data-state="alarm">
  <rect x="0" y="84" width="52" height="14" rx="3" fill="#c62828"/>
  <text x="26.0" y="94.5" text-anchor="middle" class="badge-text">ALARM</text>
</g>
<g id="label">
  <text x="20.0" y="114" text-anchor="middle" class="label-text">INDICATOR</text>
  <text x="20.0" y="126" text-anchor="middle" class="meta-text">state = alarm</text>
</g>
    </g>
    <g id="state=closed" transform="translate(232 12)">
      <g id="body">
        <circle cx="20" cy="20" r="14" fill="#cdd5df" stroke="#3a4756"/>
      </g>
      <g id="state-fill">
        <circle cx="20" cy="20" r="8" fill="#90a4ae"/>
      </g>
<g id="state-shape" data-state="closed">
  <line x1="2" y1="2" x2="38" y2="38"
        stroke="#90a4ae" stroke-width="2"/>
  <line x1="38" y1="2" x2="2" y2="38"
        stroke="#90a4ae" stroke-width="2"/>
</g>
<g id="state-badge" data-state="closed">
  <rect x="0" y="84" width="60" height="14" rx="3" fill="#90a4ae"/>
  <text x="30.0" y="94.5" text-anchor="middle" class="badge-text">CLOSED</text>
</g>
<g id="label">
  <text x="20.0" y="114" text-anchor="middle" class="label-text">INDICATOR</text>
  <text x="20.0" y="126" text-anchor="middle" class="meta-text">state = closed</text>
</g>
    </g>
  </g>
</svg>
