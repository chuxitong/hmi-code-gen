  <line x1="44" y1="474" x2="944" y2="474" stroke="#d6dae0"/>
  <text x="60"  y="460" class="cell">5</text>
  <text x="120" y="460" class="cell" font-weight="600">Hold</text>
  <text x="500" y="460" class="cell" font-family="Consolas,monospace">20 min</text>
