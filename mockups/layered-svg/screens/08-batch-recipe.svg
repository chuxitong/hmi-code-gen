    <rect x="640" y="444" width="86" height="22" rx="3" fill="#5a6675"/>
    <text x="683" y="459" text-anchor="middle" class="badge-text">PENDING</text>
  </g>
  <g><rect x="820" y="442" width="60" height="26" rx="3" fill="white" stroke="#3a4756"/>
     <text x="850" y="460" text-anchor="middle" class="button-text">View</text></g>
</g>
<g id="step-row">
  <rect x="44" y="494" width="900" height="44" fill="white"/>
  <line x1="44" y1="538" x2="944" y2="538" stroke="#d6dae0"/>
  <text x="60"  y="524" class="cell">6</text>
  <text x="120" y="524" class="cell" font-weight="600">Cool down</text>
  <text x="500" y="524" class="cell" font-family="Consolas,monospace">12 min</text>
  <g id="state-badge">
    <rect x="640" y="508" width="86" height="22" rx="3" fill="#5a6675"/>
    <text x="683" y="523" text-anchor="middle" class="badge-text">PENDING</text>
  </g>
  <g><rect x="820" y="506" width="60" height="26" rx="3" fill="white" stroke="#3a4756"/>
     <text x="850" y="524" text-anchor="middle" class="button-text">View</text></g>
</g>
<g id="step-row">
  <rect x="44" y="558" width="900" height="44" fill="white"/>
  <line x1="44" y1="602" x2="944" y2="602" stroke="#d6dae0"/>
  <text x="60"  y="588" class="cell">7</text>
  <text x="120" y="588" class="cell" font-weight="600">Discharge</text>
  <text x="500" y="588" class="cell" font-family="Consolas,monospace">6 min</text>
