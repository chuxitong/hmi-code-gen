  <line x1="44" y1="346" x2="944" y2="346" stroke="#d6dae0"/>
  <text x="60"  y="332" class="cell">3</text>
  <text x="120" y="332" class="cell" font-weight="600">Mix</text>
  <text x="500" y="332" class="cell" font-family="Consolas,monospace">15 min</text>
  <g id="state-badge">
