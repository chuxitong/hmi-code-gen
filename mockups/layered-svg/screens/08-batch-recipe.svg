</g>
<text x="44" y="128" class="h2">Steps</text>
<g id="step-head">
  <rect x="44" y="148" width="900" height="34" fill="#eaeef3"/>
  <text x="60"  y="170" class="small" font-weight="700">#</text>
  <text x="120" y="170" class="small" font-weight="700">Step</text>
  <text x="500" y="170" class="small" font-weight="700">Duration</text>
  <text x="640" y="170" class="small" font-weight="700">Status</text>
  <text x="820" y="170" class="small" font-weight="700">Action</text>
</g>
<g id="step-row">
