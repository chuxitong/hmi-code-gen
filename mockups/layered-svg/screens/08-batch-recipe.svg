  <rect x="1016" y="228" width="60" height="18" rx="3" fill="#2e7d32"/>
  <text x="1046" y="241" text-anchor="middle" class="badge-text">OK</text>
</g>
<g id="param">
  <rect x="1204" y="160" width="190" height="92" rx="6" fill="white" stroke="#d6dae0"/>
  <text x="1216" y="182" class="small">pH</text>
  <text x="1216" y="218" class="num" font-family="Consolas,monospace">7.1</text>
  <rect x="1216" y="228" width="60" height="18" rx="3" fill="#2e7d32"/>
  <text x="1246" y="241" text-anchor="middle" class="badge-text">OK</text>
</g>
<g id="param">
  <rect x="1004" y="270" width="190" height="92" rx="6" fill="white" stroke="#d6dae0"/>
  <text x="1016" y="292" class="small">RPM</text>
  <text x="1016" y="328" class="num" font-family="Consolas,monospace">240</text>
  <rect x="1016" y="338" width="60" height="18" rx="3" fill="#2e7d32"/>
  <text x="1046" y="351" text-anchor="middle" class="badge-text">OK</text>
</g>
<g id="param">
  <rect x="1204" y="270" width="190" height="92" rx="6" fill="white" stroke="#d6dae0"/>
  <text x="1216" y="292" class="small">Pressure</text>
  <text x="1216" y="328" class="num" font-family="Consolas,monospace">1.18 bar</text>
  <rect x="1216" y="338" width="60" height="18" rx="3" fill="#ef6c00"/>
  <text x="1246" y="351" text-anchor="middle" class="badge-text">WARN</text>
</g>
<g id="timeline">
  <rect x="984" y="440" width="432" height="320" rx="6" fill="#ffffff" stroke="#d6dae0"/>
</g>
<text x="1004" y="468" class="h2">Timeline</text>
<line x1="1004" y1="510" x2="1396" y2="510" stroke="#d6dae0" stroke-width="2"/>
<g id="tl-step">
  <circle cx="1004" cy="510" r="12" fill="#2e7d32"/>
  <text x="1004" y="514" text-anchor="middle" class="badge-text">1</text>
  <text x="1004" y="540" text-anchor="middle" class="meta">10m</text>
</g>
<g id="tl-step">
  <circle cx="1069" cy="510" r="12" fill="#2e7d32"/>
  <text x="1069" y="514" text-anchor="middle" class="badge-text">2</text>
  <text x="1069" y="540" text-anchor="middle" class="meta">8m</text>
</g>
<g id="tl-step">
  <circle cx="1134" cy="510" r="12" fill="#1976d2"/>
  <text x="1134" y="514" text-anchor="middle" class="badge-text">3</text>
  <text x="1134" y="540" text-anchor="middle" class="meta">15m</text>
</g>
<g id="tl-step">
  <circle cx="1199" cy="510" r="12" fill="#5a6675"/>
  <text x="1199" y="514" text-anchor="middle" class="badge-text">4</text>
  <text x="1199" y="540" text-anchor="middle" class="meta">4m</text>
</g>
<g id="tl-step">
  <circle cx="1264" cy="510" r="12" fill="#5a6675"/>
  <text x="1264" y="514" text-anchor="middle" class="badge-text">5</text>
  <text x="1264" y="540" text-anchor="middle" class="meta">20m</text>
</g>
<g id="tl-step">
  <circle cx="1329" cy="510" r="12" fill="#5a6675"/>
  <text x="1329" y="514" text-anchor="middle" class="badge-text">6</text>
  <text x="1329" y="540" text-anchor="middle" class="meta">12m</text>
</g>
<g id="tl-step">
  <circle cx="1394" cy="510" r="12" fill="#5a6675"/>
  <text x="1394" y="514" text-anchor="middle" class="badge-text">7</text>
  <text x="1394" y="540" text-anchor="middle" class="meta">6m</text>
</g>
<g id="batch-actions">
  <g><rect x="1004" y="690" width="120" height="44" rx="4" fill="#2e7d32"/>
     <text x="1064" y="718" text-anchor="middle" fill="white" font-size="14" font-weight="700">RESUME</text></g>
  <g><rect x="1136" y="690" width="120" height="44" rx="4" fill="#ef6c00"/>
     <text x="1196" y="718" text-anchor="middle" fill="white" font-size="14" font-weight="700">HOLD</text></g>
  <g><rect x="1268" y="690" width="128" height="44" rx="4" fill="#c62828"/>
     <text x="1332" y="718" text-anchor="middle" fill="white" font-size="14" font-weight="700">ABORT</text></g>
</g>
<g id="footer-status">
  <rect x="0" y="864" width="1440" height="36" fill="#eaeef3" stroke="#d6dae0"/>
  <text x="24" y="886" class="meta">Recipe R-204  ·  Step 3 of 7 ACTIVE  ·  Compliance: ANSI/ISA-101.01</text>
</g>
</svg>
