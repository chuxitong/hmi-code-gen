  <line x1="44" y1="410" x2="944" y2="410" stroke="#d6dae0"/>
  <text x="60"  y="396" class="cell">4</text>
  <text x="120" y="396" class="cell" font-weight="600">Add catalyst</text>
  <text x="500" y="396" class="cell" font-family="Consolas,monospace">4 min</text>
  <g id="state-badge">
