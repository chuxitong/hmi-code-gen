  <line x1="44" y1="218" x2="944" y2="218" stroke="#d6dae0"/>
  <text x="60"  y="204" class="cell">1</text>
  <text x="120" y="204" class="cell" font-weight="600">Pre-heat</text>
  <text x="500" y="204" class="cell" font-family="Consolas,monospace">10 min</text>
  <g id="state-badge">
    <rect x="640" y="188" width="86" height="22" rx="3" fill="#2e7d32"/>
    <text x="683" y="203" text-anchor="middle" class="badge-text">DONE</text>
  </g>
  <g><rect x="820" y="186" width="60" height="26" rx="3" fill="white" stroke="#3a4756"/>
     <text x="850" y="204" text-anchor="middle" class="button-text">View</text></g>
</g>
<g id="step-row">
  <rect x="44" y="238" width="900" height="44" fill="white"/>
  <line x1="44" y1="282" x2="944" y2="282" stroke="#d6dae0"/>
  <text x="60"  y="268" class="cell">2</text>
  <text x="120" y="268" class="cell" font-weight="600">Fill base</text>
  <text x="500" y="268" class="cell" font-family="Consolas,monospace">8 min</text>
  <g id="state-badge">
    <rect x="640" y="252" width="86" height="22" rx="3" fill="#2e7d32"/>
    <text x="683" y="267" text-anchor="middle" class="badge-text">DONE</text>
  </g>
  <g><rect x="820" y="250" width="60" height="26" rx="3" fill="white" stroke="#3a4756"/>
