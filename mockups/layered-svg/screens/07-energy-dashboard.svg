<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900"
     viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <title>Energy Monitoring Dashboard</title>
  <defs>
    <style>
      .h1 { font-size: 18px; font-weight: 700; fill: #1b2630; }
      .h2 { font-size: 14px; font-weight: 700; fill: #1b2630; }
      .small { font-size: 11px; fill: #5a6675; }
      .meta  { font-size: 10px; fill: #5a6675; }
      .num   { font-size: 26px; font-weight: 700; fill: #1b2630; }
      .cell  { font-size: 12px; fill: #1b2630; }
      .badge-text { font-size: 10px; font-weight: 700; fill: white; }
      .header-title { font-size: 18px; font-weight: 700; fill: #ffffff; }
      .header-meta  { font-size: 11px; fill: #c8d3e2; }
      .button-text  { font-size: 11px; font-weight: 600; fill: #1b2630; }
    </style>
  </defs>
  <rect x="0" y="0" width="1440" height="900" fill="#f3f5f8"/>
<g id="layout-guide" opacity="0.6"><line x1="24.0" y1="80" x2="24.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="140.0" y1="80" x2="140.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="256.0" y1="80" x2="256.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="372.0" y1="80" x2="372.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="488.0" y1="80" x2="488.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="604.0" y1="80" x2="604.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="720.0" y1="80" x2="720.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="836.0" y1="80" x2="836.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="952.0" y1="80" x2="952.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1068.0" y1="80" x2="1068.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1184.0" y1="80" x2="1184.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1300.0" y1="80" x2="1300.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1416.0" y1="80" x2="1416.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/></g>
<g id="header">
