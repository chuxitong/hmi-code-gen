<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900"
     viewBox="0 0 1440 900" font-family="Inter, system-ui, sans-serif">
  <title>Operator Control Panel</title>
  <defs>
    <style>
      .h1 { font-size: 18px; font-weight: 700; fill: #1b2630; }
      .h2 { font-size: 14px; font-weight: 700; fill: #1b2630; }
      .small { font-size: 11px; fill: #5a6675; }
      .meta  { font-size: 10px; fill: #5a6675; }
      .num   { font-size: 26px; font-weight: 700; fill: #1b2630; }
      .cell  { font-size: 12px; fill: #1b2630; }
      .badge-text { font-size: 10px; font-weight: 700; fill: white; }
      .header-title { font-size: 18px; font-weight: 700; fill: #ffffff; }
      .header-meta  { font-size: 11px; fill: #c8d3e2; }
      .button-text  { font-size: 11px; font-weight: 600; fill: #1b2630; }
    </style>
  </defs>
  <rect x="0" y="0" width="1440" height="900" fill="#f3f5f8"/>
<g id="layout-guide" opacity="0.6"><line x1="24.0" y1="80" x2="24.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="140.0" y1="80" x2="140.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="256.0" y1="80" x2="256.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="372.0" y1="80" x2="372.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="488.0" y1="80" x2="488.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="604.0" y1="80" x2="604.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="720.0" y1="80" x2="720.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="836.0" y1="80" x2="836.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="952.0" y1="80" x2="952.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1068.0" y1="80" x2="1068.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1184.0" y1="80" x2="1184.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1300.0" y1="80" x2="1300.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/><line x1="1416.0" y1="80" x2="1416.0" y2="860" stroke="#dde3ea" stroke-dasharray="2 4" stroke-width="0.6"/></g>
<g id="header">
  <rect x="0" y="0" width="1440" height="64" fill="#13314f"/>
  <text x="24" y="40" class="header-title">Operator Control Panel</text>
  <text x="24" y="56" class="header-meta">Unit: U2  ·  Loop: Mixer MX-501  ·  Operator: A. Petrov</text>
  <g id="header-clock">
    <rect x="1240" y="14" width="180" height="36" rx="4" fill="#1d4067" stroke="#1d4067"/>
    <text x="1330" y="38" text-anchor="middle" class="header-meta">2026-04-19  14:32:07 MSK</text>
  </g>
</g>
<g id="actions-panel">
  <rect x="24" y="100" width="680" height="520" rx="6" fill="#ffffff" stroke="#d6dae0"/>
</g>
<g id="actions-header">
  <text x="44" y="130" class="h2">Manual control</text>
</g>
<g id="action-buttons">
  <g><rect x="44" y="160" width="180" height="80" rx="6" fill="#2e7d32"/>
     <text x="134" y="208" text-anchor="middle" fill="white" font-size="22" font-weight="700">START</text></g>
  <g><rect x="244" y="160" width="180" height="80" rx="6" fill="#c62828"/>
     <text x="334" y="208" text-anchor="middle" fill="white" font-size="22" font-weight="700">STOP</text></g>
  <g><rect x="444" y="160" width="180" height="80" rx="6" fill="white" stroke="#3a4756" stroke-width="2"/>
     <text x="534" y="208" text-anchor="middle" fill="#3a4756" font-size="22" font-weight="700">RESET</text></g>
</g>
<g id="mode-selector">
  <text x="44" y="280" class="h2">Operating mode</text>
  <g><rect x="44" y="296" width="180" height="48" rx="4" fill="#13314f"/>
     <text x="134" y="326" text-anchor="middle" fill="white" font-size="14" font-weight="700">AUTO</text></g>
  <g><rect x="244" y="296" width="180" height="48" rx="4" fill="white" stroke="#3a4756"/>
     <text x="334" y="326" text-anchor="middle" fill="#3a4756" font-size="14" font-weight="700">MANUAL</text></g>
  <g><rect x="444" y="296" width="180" height="48" rx="4" fill="white" stroke="#3a4756"/>
     <text x="534" y="326" text-anchor="middle" fill="#3a4756" font-size="14" font-weight="700">SERVICE</text></g>
</g>
<g id="setpoints">
  <text x="44" y="380" class="h2">Setpoints</text>
  <text x="44" y="408" class="small">Temperature</text>
  <rect x="44" y="416" width="280" height="40" rx="4" fill="white" stroke="#3a4756"/>
  <text x="60" y="442" class="cell" font-family="Consolas,monospace">75.0 °C</text>
  <g><rect x="334" y="416" width="80" height="40" rx="4" fill="#2e7d32"/>
     <text x="374" y="442" text-anchor="middle" fill="white" font-weight="700">SET</text></g>

  <text x="44" y="478" class="small">Flow rate</text>
  <rect x="44" y="486" width="280" height="40" rx="4" fill="white" stroke="#3a4756"/>
  <text x="60" y="512" class="cell" font-family="Consolas,monospace">180 L/min</text>
  <g><rect x="334" y="486" width="80" height="40" rx="4" fill="#2e7d32"/>
     <text x="374" y="512" text-anchor="middle" fill="white" font-weight="700">SET</text></g>

  <text x="44" y="558" class="small">Mixer RPM</text>
  <rect x="44" y="566" width="280" height="40" rx="4" fill="white" stroke="#3a4756"/>
  <text x="60" y="592" class="cell" font-family="Consolas,monospace">240 rpm</text>
  <g><rect x="334" y="566" width="80" height="40" rx="4" fill="#2e7d32"/>
     <text x="374" y="592" text-anchor="middle" fill="white" font-weight="700">SET</text></g>
</g>
<g id="readouts-panel">
  <rect x="720" y="100" width="696" height="520" rx="6" fill="#ffffff" stroke="#d6dae0"/>
</g>
<g id="readouts-header">
  <text x="740" y="130" class="h2">Live readouts</text>
</g>
<g id="readout">
  <rect x="740" y="160" width="312" height="200" rx="6" fill="white" stroke="#d6dae0"/>
  <text x="756" y="190" class="small">Temperature out</text>
  <text x="756" y="258" font-size="56" font-weight="700" fill="#1b2630" font-family="Consolas,monospace">74.6</text>
  <text x="756" y="290" class="small">°C</text>
  <g id="state-badge">
    <rect x="756" y="310" width="80" height="22" rx="3" fill="#2e7d32"/>
    <text x="796" y="325" text-anchor="middle" class="badge-text">OK</text>
  </g>
</g>
<g id="readout">
  <rect x="1072" y="160" width="312" height="200" rx="6" fill="white" stroke="#d6dae0"/>
  <text x="1088" y="190" class="small">Flow out</text>
  <text x="1088" y="258" font-size="56" font-weight="700" fill="#1b2630" font-family="Consolas,monospace">178</text>
  <text x="1088" y="290" class="small">L/min</text>
  <g id="state-badge">
    <rect x="1088" y="310" width="80" height="22" rx="3" fill="#2e7d32"/>
    <text x="1128" y="325" text-anchor="middle" class="badge-text">OK</text>
  </g>
</g>
<g id="readout">
  <rect x="740" y="380" width="312" height="200" rx="6" fill="white" stroke="#d6dae0"/>
  <text x="756" y="410" class="small">Mixer RPM</text>
  <text x="756" y="478" font-size="56" font-weight="700" fill="#1b2630" font-family="Consolas,monospace">238</text>
  <text x="756" y="510" class="small">rpm</text>
  <g id="state-badge">
    <rect x="756" y="530" width="80" height="22" rx="3" fill="#2e7d32"/>
    <text x="796" y="545" text-anchor="middle" class="badge-text">OK</text>
  </g>
</g>
<g id="readout">
  <rect x="1072" y="380" width="312" height="200" rx="6" fill="white" stroke="#d6dae0"/>
  <text x="1088" y="410" class="small">Pressure</text>
  <text x="1088" y="478" font-size="56" font-weight="700" fill="#1b2630" font-family="Consolas,monospace">3.18</text>
  <text x="1088" y="510" class="small">bar</text>
  <g id="state-badge">
    <rect x="1088" y="530" width="80" height="22" rx="3" fill="#ef6c00"/>
    <text x="1128" y="545" text-anchor="middle" class="badge-text">WARN</text>
  </g>
</g>
<g id="footer-status">
  <rect x="0" y="864" width="1440" height="36" fill="#eaeef3" stroke="#d6dae0"/>
  <text x="24" y="886" class="meta">Connection: OK  ·  Loop status: closed-loop AUTO  ·  Compliance: ANSI/ISA-101.01</text>
</g>
</svg>
