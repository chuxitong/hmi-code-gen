<!DOCTYPE html>
<html><head><style>
  body { background: #1e1e2e; color: #e0e0e0; font-family: sans-serif; padding: 24px; }
  .card { background: #2a2a3e; border-radius: 8px; padding: 16px; margin: 12px; display: inline-block; width: 200px; }
  .status { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
  .ok { background: #4caf50; }
  .warn { background: #ff9800; }
</style></head><body>
<h2>Equipment Status</h2>
<div class="card"><span class="status ok"></span>Pump A — Running</div>
<div class="card"><span class="status warn"></span>Pump B — Warning</div>
</body></html>
