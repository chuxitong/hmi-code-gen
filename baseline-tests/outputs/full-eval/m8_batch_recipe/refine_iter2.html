<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Batch Recipe</title>
<style>
  :root {
    --bg: #1e1e2e;
    --panel: #2d2d42;
    --panel-2: #32324a;
    --text: #e6e6ec;
    --muted: #a0a0b0;
    --ok: #4caf50;
    --warn: #ff9800;
    --err: #e53935;
    --info: #2196f3;
    --accent: #00bcd4;
    --border: #4d4d66;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, Arial, sans-serif; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  h2 { font-size: 16px; margin: 4px 0 12px; color: var(--muted); font-weight: 500; }
  .grid { display: grid; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; }
  .ok { background: rgba(76,175,80,.18); color: var(--ok); }
  .warn { background: rgba(255,152,0,.18); color: var(--warn); }
  .err { background: rgba(229,57,53,.20); color: var(--err); }
  .info { background: rgba(33,150,243,.18); color: var(--info); }
  button.btn { background: var(--accent); color: #001014; border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
  button.btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .kpi { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .kpi .card { min-width: 160px; }
  .kpi .v { font-size: 22px; font-weight: 600; }
  .kpi .l { color: var(--muted); font-size: 12px; }
</style></head><body>
<h1>Batch Recipe Management</h1><h2>Recipe R-204 • Lot 2026-017</h2><div class="grid" style="grid-template-columns: 2fr 1fr;"><div class="card"><table><thead><tr><th>#</th><th>Step</th><th>Duration</th><th>Status</th></tr></thead><tbody><tr><td>1</td><td>Pre-heat</td><td>10 min</td><td><span class="pill ok">DONE</span></td></tr><tr><td>2</td><td>Fill base</td><td>8 min</td><td><span class="pill ok">DONE</span></td></tr><tr><td>3</td><td>Mix</td><td>15 min</td><td><span class="pill info">ACTIVE</span></td></tr><tr><td>4</td><td>Hold</td><td>20 min</td><td><span class="pill warn">PENDING</span></td></tr><tr><td>5</td><td>Cool down</td><td>12 min</td><td><span class="pill warn">PENDING</span></td></tr></tbody></table></div><div class="card"><h2>Parameters</h2><div class="kpi"><div class="card"><div class="l">Temp</div><div class="v">65.4</div></div><div class="card"><div class="l">pH</div><div class="v">7.1</div></div><div class="card"><div class="l">RPM</div><div class="v">240</div></div></div></div></div>
</body></html>
