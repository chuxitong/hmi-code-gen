<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Production Overview</title>
<style>
  :root {
    --bg: #1e1e2e;
    --panel: #2d2d42;
    --panel-2: #32324a;
    --text: #e6e6ec;
    --muted: #a0a0b0;
    --ok: #4caf50;
    --warn: #ff9800;
    --err: #e53935;
    --info: #2196f3;
    --accent: #00bcd4;
    --border: #4d4d66;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, Arial, sans-serif; padding: 20px; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  h2 { font-size: 16px; margin: 4px 0 12px; color: var(--muted); font-weight: 500; }
  .grid { display: grid; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; }
  .ok { background: rgba(76,175,80,.18); color: var(--ok); }
  .warn { background: rgba(255,152,0,.18); color: var(--warn); }
  .err { background: rgba(229,57,53,.20); color: var(--err); }
  .info { background: rgba(33,150,243,.18); color: var(--info); }
  button.btn { background: var(--accent); color: #001014; border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
  button.btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .kpi { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .kpi .card { min-width: 160px; }
  .kpi .v { font-size: 22px; font-weight: 600; }
  .kpi .l { color: var(--muted); font-size: 12px; }
</style></head><body>
<h1>Production Line Overview</h1><div class="kpi"><div class="card"><div class="l">OEE</div><div class="v">82.5%</div></div><div class="card"><div class="l">Units / h</div><div class="v">12 480</div></div><div class="card"><div class="l">Reject</div><div class="v">0.6%</div></div></div><div style="display:flex; gap:12px; overflow:auto;"><div class="card" style="min-width:120px; text-align:center;"><div class="l">Filler</div><div class="v">98%</div><div class="pill ok" style="margin-top:6px;">OK</div></div><div class="card" style="min-width:120px; text-align:center;"><div class="l">Capper</div><div class="v">96%</div><div class="pill ok" style="margin-top:6px;">OK</div></div><div class="card" style="min-width:120px; text-align:center;"><div class="l">Labeler</div><div class="v">84%</div><div class="pill warn" style="margin-top:6px;">SLOW</div></div><div class="card" style="min-width:120px; text-align:center;"><div class="l">Packer</div><div class="v">92%</div><div class="pill ok" style="margin-top:6px;">OK</div></div><div class="card" style="min-width:120px; text-align:center;"><div class="l">Palletizer</div><div class="v">99%</div><div class="pill ok" style="margin-top:6px;">OK</div></div></div>
</body></html>
