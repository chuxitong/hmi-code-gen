<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Trend Monitor</title>
<style>
  :root {
    --bg: #1e1e2e;
    --panel: #2a2a3e;
    --panel-2: #32324a;
    --text: #e6e6ec;
    --muted: #a0a0b0;
    --ok: #4caf50;
    --warn: #ff9800;
    --err: #e53935;
    --info: #2196f3;
    --accent: #00bcd4;
    --border: #44445a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, Arial, sans-serif; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  h2 { font-size: 16px; margin: 4px 0 12px; color: var(--muted); font-weight: 500; }
  .grid { display: grid; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; }
  .ok { background: rgba(76,175,80,.18); color: var(--ok); }
  .warn { background: rgba(255,152,0,.18); color: var(--warn); }
  .err { background: rgba(229,57,53,.20); color: var(--err); }
  .info { background: rgba(33,150,243,.18); color: var(--info); }
  button.btn { background: var(--accent); color: #001014; border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
  button.btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .kpi { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .kpi .card { min-width: 160px; }
  .kpi .v { font-size: 22px; font-weight: 600; }
  .kpi .l { color: var(--muted); font-size: 12px; }
</style></head><body>
<h1>Real-Time Trend Monitor</h1><div class="kpi"><div class="card"><div class="l">Temperature</div><div class="v">72.4 °C</div></div><div class="card"><div class="l">Pressure</div><div class="v">3.21 bar</div></div><div class="card"><div class="l">Flow</div><div class="v">184 L/min</div></div></div><div class="card" style="height:280px; position:relative; overflow:hidden;"><div style="position:absolute; inset:24px; border-left:1px solid var(--border); border-bottom:1px solid var(--border);"><svg viewBox="0 0 400 160" width="100%" height="100%" preserveAspectRatio="none"><polyline fill="none" stroke="#00bcd4" stroke-width="2" points="0,120 40,100 80,108 120,70 160,90 200,60 240,80 280,50 320,66 360,40 400,48"/><polyline fill="none" stroke="#ff9800" stroke-width="2" points="0,140 40,130 80,124 120,118 160,112 200,108 240,100 280,96 320,94 360,88 400,84"/></svg></div></div>
</body></html>
