<!DOCTYPE html>
<html lang="en"><head>
  <meta name="viewport" content="width=device-width, initial-scale=1"><meta charset="utf-8"><title>Energy Dashboard</title>
<style>
  :root {
    --bg: #1e1e2e;
    --panel: #2a2a3e;
    --panel-2: #32324a;
    --text: #e6e6ec;
    --muted: #a0a0b0;
    --ok: #4caf50;
    --warn: #ff9800;
    --err: #e53935;
    --info: #2196f3;
    --accent: #00bcd4;
    --border: #44445a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, Arial, sans-serif; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 12px; }
  h2 { font-size: 16px; margin: 4px 0 12px; color: var(--muted); font-weight: 500; }
  .grid { display: grid; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; }
  .ok { background: rgba(76,175,80,.18); color: var(--ok); }
  .warn { background: rgba(255,152,0,.18); color: var(--warn); }
  .err { background: rgba(229,57,53,.20); color: var(--err); }
  .info { background: rgba(33,150,243,.18); color: var(--info); }
  button.btn { background: var(--accent); color: #001014; border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; cursor: pointer; }
  button.btn.secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  .kpi { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .kpi .card { min-width: 160px; }
  .kpi .v { font-size: 22px; font-weight: 600; }
  .kpi .l { color: var(--muted); font-size: 12px; }
</style></head><body>
<h1>Energy Monitoring Dashboard</h1><div class="kpi"><div class="card"><div class="l">Total kWh</div><div class="v">12 845</div></div><div class="card"><div class="l">Peak</div><div class="v">742 kW</div></div><div class="card"><div class="l">Cost</div><div class="v">€ 1 932</div></div></div><div class="card"><div style="display:flex; align-items:center; gap:8px; margin:6px 0;"><div class="l" style="width:120px;">Zone A</div><div style="flex:1; background: var(--panel-2); height:10px; border-radius:6px; overflow:hidden;"><div style="height:100%; width:62%; background: var(--accent);"></div></div><div style="width:60px; text-align:right;">62%</div></div><div style="display:flex; align-items:center; gap:8px; margin:6px 0;"><div class="l" style="width:120px;">Zone B</div><div style="flex:1; background: var(--panel-2); height:10px; border-radius:6px; overflow:hidden;"><div style="height:100%; width:48%; background: var(--accent);"></div></div><div style="width:60px; text-align:right;">48%</div></div><div style="display:flex; align-items:center; gap:8px; margin:6px 0;"><div class="l" style="width:120px;">Zone C</div><div style="flex:1; background: var(--panel-2); height:10px; border-radius:6px; overflow:hidden;"><div style="height:100%; width:81%; background: var(--accent);"></div></div><div style="width:60px; text-align:right;">81%</div></div><div style="display:flex; align-items:center; gap:8px; margin:6px 0;"><div class="l" style="width:120px;">Zone D</div><div style="flex:1; background: var(--panel-2); height:10px; border-radius:6px; overflow:hidden;"><div style="height:100%; width:35%; background: var(--accent);"></div></div><div style="width:60px; text-align:right;">35%</div></div></div>
</body></html>
